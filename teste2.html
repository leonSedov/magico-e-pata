<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mágico & Pata: Uma Jornada Contra a Tirania</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fundo preto caso a imagem demore a carregar */
            font-family: 'Press Start 2P', cursive;
        }

        /* Fundo com a imagem gerada */
        .background-container {
            background-image: url('imagemfundo.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            image-rendering: pixelated; 
            position: relative;
        }

        /* Menu de Botões */
        .menu {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 25px;
            /* Empurra o menu um pouco para baixo para não cobrir o título da imagem */
            margin-top: 120px; 
        }

        .pixel-btn {
            background: none;
            border: none;
            color: #FFFFFF;
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            cursor: pointer;
            text-transform: uppercase;
            /* Sombra preta para dar leitura sobre a imagem colorida */
            text-shadow: 4px 4px 0px #000;
            padding: 10px 30px;
            transition: transform 0.1s ease-in-out;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        /* Efeito de Seleção */
        .pixel-btn:hover {
            color: #FFD700; /* Dourado */
            transform: scale(1.1);
            text-shadow: 5px 5px 0px #000;
        }

        /* Seta de seleção estilo Metal Slug */
        .pixel-btn:hover::before {
            content: '▶';
            position: absolute;
            left: -35px;
            color: #FFD700;
            animation: blink 0.4s steps(2) infinite;
        }

        @keyframes blink {
            from { visibility: hidden; }
            to { visibility: visible; }
        }

        /* Sombras extras para os botões ficarem visíveis em qualquer parte da imagem */
        .pixel-btn:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

    <div class="background-container">
        <nav class="menu">
            <button class="pixel-btn" onclick="goTo('index.html')">Start Game</button>
            <button class="pixel-btn" onclick="goTo('portfolio.html')">Nosso Portfólio</button>
            <button class="pixel-btn" onclick="goTo('outros.html')">Outros Jogos</button>
        </nav>
    </div>

    <script>
        function goTo(url) {
            // Pequeno delay para simular o "carregamento" do jogo
            console.log("Redirecionando para: " + url);
            window.location.href = url;
        }
    </script>
</body>
</html>
